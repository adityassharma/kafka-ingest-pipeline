# =============================================================================
# Kafka Producer Properties
# kafka-ingest-pipeline — producer.io.github.adityassharma.kafka.ProducerMain
# =============================================================================

# ---------------------------------------------------------------------------
# Kafka Broker Connection
# ---------------------------------------------------------------------------
bootstrap.servers=localhost:9092

# ---------------------------------------------------------------------------
# Topic
# ---------------------------------------------------------------------------
topic.name=open-notify-iss

# ---------------------------------------------------------------------------
# Thread Configuration
#   Each producer thread calls a different API endpoint or a different page/
#   offset of the same API and writes to the shared topic.
#   With 4 partitions: valid values are 1, 2, 4.
# ---------------------------------------------------------------------------
num.producer.threads=1

# ---------------------------------------------------------------------------
# Data Source (NASA / Open-Notify APIs — no auth, JSON, low volume)
#   ISS current position polled every 5s.
# ---------------------------------------------------------------------------
data.source.iss.position=http://api.open-notify.org/iss-now.json
# Polling interval per thread (ms)
polling.interval.ms=5000

# ---------------------------------------------------------------------------
# Serialization
# ---------------------------------------------------------------------------
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=org.apache.kafka.common.serialization.StringSerializer

# ---------------------------------------------------------------------------
# Delivery / Durability
#   acks=all  → leader waits for all in-sync replicas to acknowledge
#   acks=1    → leader only (faster, single-broker dev setup is fine with 1)
#   retries   → number of retries on transient errors
# ---------------------------------------------------------------------------
acks=all
retries=3
retry.backoff.ms=500

# ---------------------------------------------------------------------------
# Batching & Throughput
#   batch.size: max bytes to batch before sending (16 KB default)
#   linger.ms: time to wait to fill the batch (0 = send immediately)
#   buffer.memory: total memory available to the producer for buffering
# ---------------------------------------------------------------------------
batch.size=16384
linger.ms=50
buffer.memory=33554432

# ---------------------------------------------------------------------------
# Compression
#   snappy: good balance of CPU and compression ratio for JSON
#   lz4:    faster compression at slightly worse ratio
#   none:   simplest for local dev
# ---------------------------------------------------------------------------
compression.type=snappy

# ---------------------------------------------------------------------------
# Request / Timeout Tuning
# ---------------------------------------------------------------------------
request.timeout.ms=30000
delivery.timeout.ms=120000
max.block.ms=60000

# ---------------------------------------------------------------------------
# Idempotence (prevents duplicate messages on retry)
# ---------------------------------------------------------------------------
enable.idempotence=true

# ---------------------------------------------------------------------------
# Security / TLS
#   security.protocol controls whether the connection to the broker is encrypted.
#
#   PLAINTEXT (default) — no encryption, no authentication.
#   SSL                 — one-way TLS: broker presents its certificate; client
#                         validates it against the truststore CA.
#                         Only ssl.truststore.* is required.
#   SASL_SSL            — SASL authentication layered over TLS (not configured here).
#
#   For mTLS (mutual TLS) the broker also authenticates the client certificate.
#   Enable SSL and additionally provide ssl.keystore.* and ssl.key.password.
# ---------------------------------------------------------------------------
#security.protocol=SSL

# Truststore — required for TLS and mTLS
#   JKS file containing the CA certificate(s) used to verify the broker cert.
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit

# Keystore — required for mTLS only
#   JKS file containing this client's certificate and private key.
#ssl.keystore.location=/path/to/client.keystore.jks
#ssl.keystore.password=changeit
#ssl.key.password=changeit

# Hostname verification (default: https = enabled).
# Set to an empty string to disable — not recommended in production.
#ssl.endpoint.identification.algorithm=https

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
app.log.dir=logs

# ---------------------------------------------------------------------------
# JVM / GC Settings (read by run-producer.sh)
#   Generational ZGC: same rationale as consumer — minimal pause, good for
#   I/O-bound threads. Generational mode adds young/old generations (Java 21+).
# ---------------------------------------------------------------------------
jvm.heap.xms=256m
jvm.heap.xmx=256m
jvm.gc.type=ZGenerational

# Generational ZGC tuning
jvm.gc.opts=-XX:+UseZGC -XX:+ZGenerational -XX:SoftMaxHeapSize=200m -XX:ZCollectionInterval=120 -XX:ConcGCThreads=2

# GC log settings
jvm.gc.log.dir=logs/gc
