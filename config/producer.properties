# =============================================================================
# Kafka Producer Properties
# kafka-ingest-pipeline — producer.io.github.adityassharma.kafka.ProducerMain
# =============================================================================

# ---------------------------------------------------------------------------
# Kafka Broker Connection
# ---------------------------------------------------------------------------
bootstrap.servers=localhost:9092

# ---------------------------------------------------------------------------
# Topic
# ---------------------------------------------------------------------------
topic.name=open-notify-iss

# ---------------------------------------------------------------------------
# Thread Configuration
#   Each producer thread calls a different API endpoint or a different page/
#   offset of the same API and writes to the shared topic.
#   With 4 partitions: valid values are 1, 2, 4.
# ---------------------------------------------------------------------------
num.producer.threads=1

# ---------------------------------------------------------------------------
# Data Source (NASA / Open-Notify APIs — no auth, JSON, low volume)
#   ISS current position polled every polling.interval.ms.
# ---------------------------------------------------------------------------
data.source.iss.position=http://api.open-notify.org/iss-now.json
# Polling interval
polling.interval.ms=5000

# ---------------------------------------------------------------------------
# Message Format
#   json (default) — raw JSON string, no schema required
#   avro           — Avro binary; also set one of the schema options below
# ---------------------------------------------------------------------------
message.format=json

# Avro option 1: file-based schema (no Schema Registry required)
#message.schema.file=config/iss-position.avsc

# Avro option 2: Confluent Schema Registry
#message.schema.registry.url=http://localhost:8081

# ---------------------------------------------------------------------------
# Serialization
# Following serializer properties are only used by the JSON path. The Avro path ignores them entirely.
# ---------------------------------------------------------------------------
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=org.apache.kafka.common.serialization.StringSerializer

# ---------------------------------------------------------------------------
# Delivery / Durability
#   acks=all  → leader waits for all in-sync replicas to acknowledge
#   acks=1    → leader only (faster, single-broker dev setup is fine with 1)
#   retries   → number of retries on transient errors
# ---------------------------------------------------------------------------
acks=all
retries=3
retry.backoff.ms=500

# ---------------------------------------------------------------------------
# Batching & Throughput
#   batch.size: max bytes to batch before sending (16 KB default)
#   linger.ms: time to wait to fill the batch (0 = send immediately)
#   buffer.memory: total memory available to the producer for buffering
# ---------------------------------------------------------------------------
batch.size=16384
linger.ms=50
buffer.memory=33554432

# ---------------------------------------------------------------------------
# Compression
#   snappy: good balance of CPU and compression ratio for JSON
#   lz4:    faster compression at slightly worse ratio
#   none:   simplest for local dev
# ---------------------------------------------------------------------------
compression.type=snappy

# ---------------------------------------------------------------------------
# Request / Timeout Tuning
# ---------------------------------------------------------------------------
request.timeout.ms=30000
delivery.timeout.ms=120000
max.block.ms=60000

# ---------------------------------------------------------------------------
# Idempotence (prevents duplicate messages on retry)
# ---------------------------------------------------------------------------
enable.idempotence=true

# ---------------------------------------------------------------------------
# Security / TLS / SASL
#   security.protocol controls transport security and authentication mode:
#
#   PLAINTEXT      (default) — no encryption, no authentication
#   SSL                      — TLS encryption only (no SASL)
#   SASL_PLAINTEXT           — SASL authentication, no TLS encryption
#   SASL_SSL                 — SASL authentication over TLS encryption
#
#   Uncomment exactly one of the four blocks below.
# ---------------------------------------------------------------------------

# --- Mode 1: PLAINTEXT (local dev default — no auth, no TLS) ---------------
# No additional properties required; this is the default when security.protocol
# is absent from the file.

# --- Mode 2: SSL (TLS encryption only — broker certificate validation) ------
#security.protocol=SSL
## Truststore: CA cert(s) used to verify the broker's TLS certificate
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit
## Keystore: only required for mTLS (broker also validates the client cert)
#ssl.keystore.location=/path/to/client.keystore.jks
#ssl.keystore.password=changeit
#ssl.key.password=changeit
## Hostname verification — set to "" to disable (not recommended in production)
#ssl.endpoint.identification.algorithm=https

# --- Mode 3: SASL_PLAINTEXT (username + password, no TLS) ------------------
#security.protocol=SASL_PLAINTEXT
## PLAIN mechanism — username/password stored on the broker
#sasl.mechanism=PLAIN
#sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#  username="alice" \
#  password="alice-secret";
## SCRAM alternative (broker must have SCRAM credentials):
#sasl.mechanism=SCRAM-SHA-256
#sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
#  username="alice" \
#  password="alice-secret";

# --- Mode 4: SASL_SSL (username + password over TLS) -----------------------
#security.protocol=SASL_SSL
## TLS truststore (required); add keystore properties below for mTLS
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit
#ssl.endpoint.identification.algorithm=https
## mTLS: also provide the client keystore so the broker can validate the client cert
#ssl.keystore.location=/path/to/client.keystore.jks
#ssl.keystore.password=changeit
#ssl.key.password=changeit
## SASL mechanism — PLAIN or SCRAM (same syntax as Mode 3 above)
#sasl.mechanism=PLAIN
#sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#  username="alice" \
#  password="alice-secret";

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
app.log.dir=logs

# ---------------------------------------------------------------------------
# JVM / GC Settings (read by run-producer.sh)
#   Generational ZGC: same rationale as consumer — minimal pause, good for
#   I/O-bound threads. Generational mode adds young/old generations (Java 21+).
# ---------------------------------------------------------------------------
jvm.heap.xms=256m
jvm.heap.xmx=256m
jvm.gc.type=ZGenerational

# Generational ZGC tuning
jvm.gc.opts=-XX:+UseZGC -XX:+ZGenerational -XX:SoftMaxHeapSize=200m -XX:ZCollectionInterval=120 -XX:ConcGCThreads=2

# GC log settings
jvm.gc.log.dir=logs/gc
