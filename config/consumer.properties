# =============================================================================
# Kafka Consumer Properties
# kafka-ingest-pipeline — consumer.io.github.adityassharma.kafka.ConsumerMain
# =============================================================================

# ---------------------------------------------------------------------------
# Kafka Broker Connection
# ---------------------------------------------------------------------------
bootstrap.servers=localhost:9092

# ---------------------------------------------------------------------------
# Consumer Group & Topic
# ---------------------------------------------------------------------------
group.id=open-notify-iss-consumer-group
topic.name=open-notify-iss

# ---------------------------------------------------------------------------
# Thread Configuration
#   Each thread runs its own KafkaConsumer subscribed to topic.name.
#   The broker's group coordinator assigns partitions via rebalance.
#   Assumption: num.consumer.threads must evenly divide the number of
#   topic partitions.  With 4 partitions: valid values are 1, 2, 4.
# ---------------------------------------------------------------------------
num.consumer.threads=2

# ---------------------------------------------------------------------------
# Message Format
#   json (default) — String value, forwarded to Elasticsearch as-is
#   avro           — Avro binary; GenericRecord is re-encoded to JSON for ES
#                    Also set one of the schema options below
# ---------------------------------------------------------------------------
message.format=json

# Avro option 1: file-based schema (no Schema Registry required)
#message.schema.file=config/iss-position.avsc

# Avro option 2: Confluent Schema Registry
#message.schema.registry.url=http://localhost:8081

# ---------------------------------------------------------------------------
# Deserialization
# ---------------------------------------------------------------------------
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ---------------------------------------------------------------------------
# Offset Management
#   auto.offset.reset: earliest | latest | none
# ---------------------------------------------------------------------------
auto.offset.reset=earliest
enable.auto.commit=false
# Explicit commit interval when using async commit (ms)
auto.commit.interval.ms=5000

# ---------------------------------------------------------------------------
# Session & Heartbeat
#   session.timeout.ms must be within [group.min.session.timeout.ms,
#   group.max.session.timeout.ms] on the broker (default broker range: 6s–5min).
#   heartbeat.interval.ms should be < session.timeout.ms / 3.
# ---------------------------------------------------------------------------
session.timeout.ms=30000
heartbeat.interval.ms=10000

# ---------------------------------------------------------------------------
# Polling
#   max.poll.records: max records returned per poll() call per thread
#   max.poll.interval.ms: max time between polls before consumer is evicted.
#   Increase if processing is slow (e.g. ES indexing is slow).
# ---------------------------------------------------------------------------
max.poll.records=500
max.poll.interval.ms=300000

# ---------------------------------------------------------------------------
# Fetch Tuning
#   fetch.min.bytes: broker waits until this much data is available
#   fetch.max.wait.ms: max time broker waits if fetch.min.bytes not satisfied
#   max.partition.fetch.bytes: max data per partition per fetch request
# ---------------------------------------------------------------------------
fetch.min.bytes=1
fetch.max.wait.ms=500
max.partition.fetch.bytes=1048576

# ---------------------------------------------------------------------------
# Elasticsearch Sink
# ---------------------------------------------------------------------------
elasticsearch.host=localhost
elasticsearch.port=9200
elasticsearch.index=<iss-positions-{now/d{yyyy-MM-dd}}>
elasticsearch.scheme=https
elasticsearch.username=elastic
elasticsearch.password=changeme
elasticsearch.ssl.truststore.location=config/elasticsearch.truststore.jks
elasticsearch.ssl.truststore.password=changeit


# ---------------------------------------------------------------------------
# Security / TLS / SASL
#   security.protocol controls transport security and authentication mode:
#
#   PLAINTEXT      (default) — no encryption, no authentication
#   SSL                      — TLS encryption only (no SASL)
#   SASL_PLAINTEXT           — SASL authentication, no TLS encryption
#   SASL_SSL                 — SASL authentication over TLS encryption
#
#   Uncomment exactly one of the four blocks below.
# ---------------------------------------------------------------------------

# --- Mode 1: PLAINTEXT (local dev default — no auth, no TLS) ---------------
# No additional properties required; this is the default when security.protocol
# is absent from the file.

# --- Mode 2: SSL (TLS encryption only — broker certificate validation) ------
#security.protocol=SSL
## Truststore: CA cert(s) used to verify the broker's TLS certificate
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit
## Keystore: only required for mTLS (broker also validates the client cert)
#ssl.keystore.location=/path/to/client.keystore.jks
#ssl.keystore.password=changeit
#ssl.key.password=changeit
## Hostname verification — set to "" to disable (not recommended in production)
#ssl.endpoint.identification.algorithm=https

# --- Mode 3: SASL_PLAINTEXT (username + password, no TLS) ------------------
#security.protocol=SASL_PLAINTEXT
## PLAIN mechanism — username/password stored on the broker
#sasl.mechanism=PLAIN
#sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#  username="aditya" \
#  password="aditya-secret";
## SCRAM alternative (broker must have SCRAM credentials):
#sasl.mechanism=SCRAM-SHA-256
#sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
#  username="aditya" \
#  password="aditya-secret";

# --- Mode 4: SASL_SSL (username + password over TLS) -----------------------
#security.protocol=SASL_SSL
## TLS truststore (required); add keystore properties below for mTLS
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit
#ssl.endpoint.identification.algorithm=https
## mTLS: also provide the client keystore so the broker can validate the client cert
#ssl.keystore.location=/path/to/client.keystore.jks
#ssl.keystore.password=changeit
#ssl.key.password=changeit
## SASL mechanism — PLAIN or SCRAM (same syntax as Mode 3 above)
#sasl.mechanism=PLAIN
#sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#  username="aditya" \
#  password="aditya-secret";

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
app.log.dir=logs

# ---------------------------------------------------------------------------
# JVM / GC Settings (read by run-consumer.sh)
#   Recommended GC: Generational ZGC — ultra-low pause, Java 21+, excellent
#   for streaming workloads where latency matters more than raw throughput.
#   Generational mode adds young/old generations for higher throughput vs
#   non-generational ZGC. -XX:SoftMaxHeapSize keeps headroom;
#   -XX:ZCollectionInterval forces periodic GC to prevent heap growth.
# ---------------------------------------------------------------------------
jvm.heap.xms=512m
jvm.heap.xmx=512m
jvm.gc.type=ZGenerational

# Generational ZGC tuning
jvm.gc.opts=-XX:+UseZGC -XX:+ZGenerational -XX:SoftMaxHeapSize=400m -XX:ZCollectionInterval=120 -XX:ConcGCThreads=2

# GC log settings (path resolved by script relative to app root)
jvm.gc.log.dir=logs/gc
