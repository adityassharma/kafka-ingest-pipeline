# =============================================================================
# Sink-only Properties  —  run on the consumer / indexing server
# kafka-ingest-pipeline — PipelineMain (sinks only)
#
# Usage:
#   java -cp target/kafka-ingest-pipeline-1.0.0-fat.jar \
#     io.github.adityassharma.kafka.pipeline.PipelineMain \
#     config/sink.properties
#
# Pair with config/source.properties running on the producer / ingestion server,
# both pointing at the same Kafka bootstrap.servers.
# For a single-server / single-JVM deployment use config/pipeline.properties.
# =============================================================================

# ---------------------------------------------------------------------------
# Kafka Broker Connection
# ---------------------------------------------------------------------------
bootstrap.servers=localhost:9092

# ---------------------------------------------------------------------------
# Message Format  (must match source.properties on the producer side)
#   json (default) | avro
# ---------------------------------------------------------------------------
message.format=json

# Avro option 1: file-based schema
#message.schema.file=config/iss-position.avsc

# Avro option 2: Confluent Schema Registry
#message.schema.registry.url=http://localhost:8081

# ---------------------------------------------------------------------------
# Sinks
# ---------------------------------------------------------------------------
sinks=es-iss,log-iss

# ---- Sink: es-iss ----------------------------------------------------------
sink.es-iss.type=elasticsearch
sink.es-iss.topics=open-notify-iss
sink.es-iss.group.id=open-notify-iss-consumer-group
sink.es-iss.threads=2
sink.es-iss.auto.offset.reset=earliest
sink.es-iss.enable.auto.commit=false
sink.es-iss.max.poll.records=500
sink.es-iss.max.poll.interval.ms=300000
sink.es-iss.session.timeout.ms=30000
sink.es-iss.heartbeat.interval.ms=10000
sink.es-iss.fetch.min.bytes=1
sink.es-iss.fetch.max.wait.ms=500
sink.es-iss.max.partition.fetch.bytes=1048576

sink.es-iss.elasticsearch.host=localhost
sink.es-iss.elasticsearch.port=9200
sink.es-iss.elasticsearch.scheme=https
sink.es-iss.elasticsearch.index=<iss-positions-{now/d{yyyy-MM-dd}}>
sink.es-iss.elasticsearch.username=elastic
sink.es-iss.elasticsearch.password=changeme
sink.es-iss.elasticsearch.ssl.truststore.location=config/elasticsearch.truststore.jks
sink.es-iss.elasticsearch.ssl.truststore.password=changeit

# DLQ: remove this line to disable DLQ for this sink
sink.es-iss.dlq.topic=open-notify-iss-es-iss-dlq

# ---- Sink: log-iss ---------------------------------------------------------
sink.log-iss.type=logging
sink.log-iss.topics=open-notify-iss
sink.log-iss.group.id=open-notify-iss-logging-group
sink.log-iss.threads=1
sink.log-iss.auto.offset.reset=earliest
sink.log-iss.enable.auto.commit=false
sink.log-iss.log.level=INFO

# ---------------------------------------------------------------------------
# Security / TLS / SASL  (uncomment exactly one block — must match the broker)
# ---------------------------------------------------------------------------

# --- Mode 1: PLAINTEXT (default) -------------------------------------------
# No additional properties required.

# --- Mode 2: SSL ------------------------------------------------------------
#security.protocol=SSL
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit
#ssl.keystore.location=/path/to/client.keystore.jks   # mTLS only
#ssl.keystore.password=changeit
#ssl.key.password=changeit
#ssl.endpoint.identification.algorithm=https

# --- Mode 3: SASL_PLAINTEXT -------------------------------------------------
#security.protocol=SASL_PLAINTEXT
#sasl.mechanism=PLAIN
#sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#  username="aditya" \
#  password="aditya-secret";

# --- Mode 4: SASL_SSL -------------------------------------------------------
#security.protocol=SASL_SSL
#ssl.truststore.location=/path/to/client.truststore.jks
#ssl.truststore.password=changeit
#ssl.endpoint.identification.algorithm=https
#sasl.mechanism=PLAIN
#sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#  username="aditya" \
#  password="aditya-secret";

# ---------------------------------------------------------------------------
# Management  (health + metrics — optional; omit this property to disable)
# ---------------------------------------------------------------------------
#management.port=8082

# ---------------------------------------------------------------------------
# Logging / JVM
# ---------------------------------------------------------------------------
app.log.dir=logs
jvm.heap.xms=512m
jvm.heap.xmx=512m
jvm.gc.type=ZGenerational
jvm.gc.opts=-XX:+UseZGC -XX:+ZGenerational -XX:SoftMaxHeapSize=400m -XX:ZCollectionInterval=120 -XX:ConcGCThreads=2
jvm.gc.log.dir=logs/gc
